version: "2"

formatters:
  enable:
    - gofmt

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - gocritic
    - revive
    - nilerr
    - wastedassign
  settings:
    errcheck:
      # Legacy (non-exhaustive) mode. Avoids flagging discarded values
      # from helpers that call t.Fatal or panic on error paths.
      check-blank: false
    govet:
      enable-all: true
      # Disable checks added in golangci-lint v2 that the shared lint
      # workflow enables by default. They surface issues that aren't
      # real problems in this project.
      disable:
        - fieldalignment # struct field reordering rarely matters; not worth the churn
        - shadow         # err shadowing is fine when the inner one is scoped narrowly
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam # false-positive on value receivers with small structs
        - unnamedResult # naming return values is optional in Go
        - dupSubExpr # flags intentional duplicate args in tests
        - dupOption # flags intentional duplicate args in tests
        - builtinShadow # conflicts with our common use of local names like "close"
    revive:
      rules:
        - name: unused-parameter
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
